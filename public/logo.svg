<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Polls That Shouldn’t Exist">
  <defs>
    <linearGradient id="g" x1="24" y1="24" x2="232" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a78bfa" />
      <stop offset="0.55" stop-color="#6366f1" />
      <stop offset="1" stop-color="#22d3ee" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="16" y="16" width="224" height="224" rx="56" fill="#070a14" />
  <rect
    x="16"
    y="16"
    width="224"
    height="224"
    rx="56"
    fill="none"
    stroke="url(#g)"
    stroke-width="12"
    opacity="0.9"
  />

  <g filter="url(#soft)">
    <rect x="56" y="56" width="144" height="144" rx="22" fill="#0b1220" opacity="0.9" />
    <rect x="56" y="56" width="144" height="144" rx="22" fill="none" stroke="#ffffff" opacity="0.12" stroke-width="2" />

    <!-- "Poll list" rows -->
    <g opacity="0.85">
      <circle cx="80" cy="92" r="8" fill="#ffffff" opacity="0.18" />
      <rect x="96" y="84" width="88" height="16" rx="8" fill="#ffffff" opacity="0.12" />

      <circle cx="80" cy="128" r="8" fill="#ffffff" opacity="0.18" />
      <rect x="96" y="120" width="72" height="16" rx="8" fill="#ffffff" opacity="0.12" />

      <circle cx="80" cy="164" r="8" fill="#ffffff" opacity="0.18" />
      <rect x="96" y="156" width="96" height="16" rx="8" fill="#ffffff" opacity="0.12" />
    </g>

    <!-- Question mark -->
    <path
      d="M128 88c-18 0-32 10-32 26 0 10 6 16 16 20 10 4 16 8 16 16v10"
      fill="none"
      stroke="url(#g)"
      stroke-width="14"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <circle cx="128" cy="172" r="8" fill="url(#g)" />
  </g>
</svg>
