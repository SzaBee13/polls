name: Deploy Edge Functions

on:
  push:
    branches:
      - main # Triggers deployment when you push to the main branch
  workflow_dispatch: # Allows you to trigger the deploy manually

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all functions
        # The --no-verify-jwt flag is optional; remove it if you want JWT auth enabled
        run: supabase functions deploy --project-ref $PROJECT_ID --no-verify-jwt